server {
    listen 3000;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # Handle client-side routing. index.html must always revalidate so a fresh
    # deploy is picked up on the next full-page load — otherwise browsers
    # heuristic-cache it (no Cache-Control → RFC 7234 default), and the OAuth
    # 302 return path ends up rendering a pre-deploy bundle from disk cache.
    # Hashed /assets/*.js keep their 1y immutable cache below (filenames change
    # every build, so there's nothing to invalidate).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Cache static assets (hashed filenames → safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # API proxy (optional fallback)
    location /api/ {
        # This will be handled by the main nginx reverse proxy
        # but included here for development scenarios
        return 404;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}